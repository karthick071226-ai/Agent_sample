<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS - Voice Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #05050a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Futuristic Background Grid */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite;
            z-index: 1;
        }

        @keyframes grid-move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* Container for Jarvis Orb */
        .assistant-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        /* The Jarvis Ball */
        .jarvis-orb {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle, #00f2fe 0%, #4facfe 70%, #000 100%);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.6),
                        inset 0 0 20px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            position: relative;
        }

        /* Core inner glow */
        .jarvis-orb::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 80%);
        }

        /* Idle State Pulse */
        .status-idle {
            animation: pulse-idle 3s infinite ease-in-out;
        }

        /* Listening State Pulse */
        .status-listening {
            animation: pulse-listening 1s infinite ease-in-out;
            background: radial-gradient(circle, #00f2fe 0%, #0052d4 70%, #000 100%);
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.9);
        }

        /* Speaking State Animation */
        .status-speaking {
            animation: speaking-wave 0.15s infinite linear;
            background: radial-gradient(circle, #00f2fe 0%, #7f00ff 70%, #000 100%);
            box-shadow: 0 0 60px rgba(127, 0, 255, 0.8);
        }

        /* Thinking State Animation */
        .status-thinking {
            animation: thinking-spin 1.5s infinite linear;
            border: 4px dashed #00f2fe;
        }

        /* Animations */
        @keyframes pulse-idle {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(0, 242, 254, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 45px rgba(0, 242, 254, 0.8); }
        }

        @keyframes pulse-listening {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(0, 242, 254, 0.6); }
            50% { transform: scale(1.15); box-shadow: 0 0 60px rgba(0, 242, 254, 1); }
        }

        @keyframes speaking-wave {
            0% { transform: scale(1.05) translate(1px, 1px); }
            50% { transform: scale(1.08) translate(-1px, -1px); }
            100% { transform: scale(1.05) translate(1px, -1px); }
        }

        @keyframes thinking-spin {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1) rotate(360deg); }
        }

        /* Click prompt overlay */
        #start-prompt {
            position: absolute;
            color: rgba(0, 242, 254, 0.6);
            bottom: -40px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="grid"></div>

    <div class="assistant-container" id="assistant-trigger">
        <div class="jarvis-orb status-idle" id="jarvis-ball"></div>
        <div id="start-prompt">Click Orb to Initialize Jarvis</div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const jarvisBall = document.getElementById('jarvis-ball');
        const trigger = document.getElementById('assistant-trigger');
        const startPrompt = document.getElementById('start-prompt');

        let recognition;
        let isJarvisActive = false;

        if (!SpeechRecognition) {
            alert("Your browser does not support Web Speech API. Please use Google Chrome.");
        } else {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                setStatus('listening');
            };

            recognition.onerror = (event) => {
                console.error("Speech recognition error", event.error);
                setStatus('idle');
            };

            recognition.onend = () => {
                if (isJarvisActive) {
                    recognition.start();
                } else {
                    setStatus('idle');
                }
            };

            recognition.onresult = async (event) => {
                const current = event.resultIndex;
                const transcript = event.results[current][0].transcript.toLowerCase().trim();
                
                recognition.stop(); // Stop listening while processing
                await handleCommand(transcript);
            };
        }

        trigger.addEventListener('click', () => {
            if (!isJarvisActive) {
                isJarvisActive = true;
                startPrompt.style.display = 'none';
                speak("Jarvis systems online. How can I assist you?");
            }
        });

        function setStatus(state) {
            jarvisBall.className = 'jarvis-orb'; 
            if (state === 'listening') jarvisBall.classList.add('status-listening');
            else if (state === 'speaking') jarvisBall.classList.add('status-speaking');
            else if (state === 'thinking') jarvisBall.classList.add('status-thinking');
            else jarvisBall.classList.add('status-idle');
        }

        function speak(text) {
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                const selectedVoice = voices.find(voice => voice.name.includes('Google US English') || voice.name.includes('Natural'));
                if (selectedVoice) utterance.voice = selectedVoice;

                utterance.rate = 1.05;
                utterance.pitch = 0.9; 

                utterance.onstart = () => setStatus('speaking');
                utterance.onend = () => {
                    setStatus('listening');
                    if (isJarvisActive) recognition.start();
                    resolve();
                };

                window.speechSynthesis.speak(utterance);
            });
        }

        async function handleCommand(command) {
            setStatus('thinking');
            console.log("Processing command: " + command);

            // Time
            if (command.includes('time')) {
                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                await speak(`The current time is ${time}.`);
                return;
            }

            // Date
            if (command.includes('date') || command.includes('day')) {
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const date = new Date().toLocaleDateString('en-US', options);
                await speak(`Today is ${date}.`);
                return;
            }

            // Weather
            if (command.includes('weather')) {
                try {
                    const weatherRes = await fetch('https://wttr.in/?format=j1');
                    const weatherData = await weatherRes.json();
                    const currentCondition = weatherData.current_condition[0];
                    const temp = currentCondition.temp_C;
                    const desc = currentCondition.weatherDesc[0].value;
                    await speak(`The current local weather is ${desc} at ${temp} degrees Celsius.`);
                } catch (error) {
                    await speak("I am unable to access weather data at this moment.");
                }
                return;
            }

            // Stop/Sleep Command
            if (command.includes('stop') || command.includes('sleep') || command.includes('shut down')) {
                isJarvisActive = false;
                startPrompt.style.display = 'block';
                await speak("Powering down systems. Goodbye.");
                return;
            }

            // Live Search Engine (Wikipedia API)
            try {
                // Remove trigger words like "search for" or "who is" to get a cleaner query
                let searchQuery = command
                    .replace('jarvis', '')
                    .replace('search for', '')
                    .replace('tell me about', '')
                    .replace('who is', '')
                    .replace('what is', '')
                    .trim();

                const response = await fetchLiveSearch(searchQuery);
                await speak(response);
            } catch (error) {
                await speak("I encountered an issue connecting to the search network.");
            }
        }

        // Real Search Integration using Wikipedia Open API
        async function fetchLiveSearch(query) {
            if (!query) return "Please specify what you would like me to search for.";
            
            try {
                // Use the MediaWiki API to fetch a summary
                const endpoint = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&utf8=&format=json&origin=*`;
                const response = await fetch(endpoint);
                const data = await response.json();
                
                if (data.query.search && data.query.search.length > 0) {
                    // Extract the snippet of the first result
                    let snippet = data.query.search[0].snippet;
                    // Remove HTML elements from the snippet for clean voice reading
                    let cleanText = snippet.replace(/<\/?[^>]+(>|$)/g, "");
                    // Decode HTML entities (like &quot;)
                    const txt = document.createElement("textarea");
                    txt.innerHTML = cleanText;
                    cleanText = txt.value;
                    
                    return `Here is what I found on the web: ${cleanText}`;
                } else {
                    return "I couldn't find any exact matches for that on the search network.";
                }
            } catch (error) {
                console.error("Search API Error:", error);
                throw error;
            }
        }

        window.speechSynthesis.onvoiceschanged = () => {};
    </script>
</body>
</html>
