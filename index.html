<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>உறுப்பினர் பதிவு - சமத்துவ மக்கள் கட்சி</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fdfdf0; /* மிக வெளிர் மஞ்சள் பின்னணி */
            color: #333;
        }

        header {
            background-color: #ffffff; /* வெள்ளை பின்னணி */
            padding: 20px 0;
            border-bottom: 4px solid #ff0000; /* சிவப்பு நிறக் கோடு */
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-logo {
            height: 100px;
            width: auto;
            margin-right: 20px;
            border-radius: 10px;
            border: 4px solid #ffd700; /* தங்கம்/மஞ்சள் நிற பார்டர் */
        }

        .header-title {
            font-size: 2.8em;
            color: #ff0000; /* சிவப்பு நிற தலைப்பு */
            margin: 0;
            font-weight: bold;
        }

        .main-content {
            max-width: 650px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .form-heading {
            font-size: 2em;
            color: #ff0000; /* சிவப்பு நிற பாரம் தலைப்பு */
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ffd700; /* மஞ்சள் நிற கீழ்க்கோடு */
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input[type=text],
        input[type=tel],
        input[type=number],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            display: inline-block;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; /* பேடிங் உள்ளடக்கத்தை பாதிக்காது */
            font-size: 1em;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #ff0000; /* கவனம் செலுத்தும்போது சிவப்பு பார்டர் */
            outline: none;
            box-shadow: 0 0 5px rgba(255, 0, 0, 0.2);
        }

        .submit-button {
            width: 100%;
            padding: 15px;
            background-color: #ff0000; /* சிவப்பு பின்னணி */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 20px;
        }

        .submit-button:hover {
            background-color: #d10000; /* இருண்ட சிவப்பு நிறம் */
        }

        footer {
            text-align: center;
            padding: 20px 0;
            background-color: #f4f4f4;
            color: #777;
            border-top: 1px solid #ddd;
        }

        /* ஃபோன் ரெஸ்பான்சிவ் வடிவமைப்பு */
        @media screen and (max-width: 600px) {
            .header-title {
                font-size: 2em;
            }
            .header-logo {
                height: 70px;
            }
            .main-content {
                padding: 20px;
                margin: 20px;
            }
            .form-heading {
                font-size: 1.6em;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <!-- குறிப்பு: படத்தில் உள்ள தலைவரின் புகைப்படத்தைப் பயன்படுத்தவும் -->
        <img src="1000088750.jpg" alt="சமத்துவ மக்கள் கட்சித் தலைவர்" class="header-logo">
        <h1 class="header-title">சமத்துவ மக்கள் கட்சி</h1>
    </div>
</header>

<main>
    <div class="main-content">
        <h2 class="form-heading">உறுப்பினர் பதிவு</h2>
        
        <!-- Web3 Forms API மூலம் மின்னஞ்சலுக்கு தரவை அனுப்பும் பாரம் -->
        <form action="https://api.web3forms.com/submit" method="POST">
            
            <!-- உங்கள் Web3 Forms API Key-ஐ இங்கே மாற்றவும் -->
            <input type="hidden" name="access_key" value="[YOUR_API_KEY_HERE]">
            
            <!-- பாரம் வெற்றிகரமாக சமர்ப்பிக்கப்பட்டால் செல்லும் பக்கம் -->
            <input type="hidden" name="redirect" value="https://example.com/thank-you">

            <div class="form-group">
                <label for="name">பெயர்</label>
                <input type="text" id="name" name="name" placeholder="உங்கள் பெயர்" required>
            </div>

            <div class="form-group">
                <label for="address">முகவரி</label>
                <textarea id="address" name="address" placeholder="உங்கள் முழு முகவரி" required></textarea>
            </div>

            <div class="form-group">
                <label for="phone">தொலைபேசி எண்</label>
                <input type="tel" id="phone" name="phone" placeholder="உங்கள் தொலைபேசி எண்" required pattern="[0-9]{10}">
            </div>

            <div class="form-group">
                <label for="position">பதவி/பொறுப்பு</label>
                <input type="text" id="position" name="position" placeholder="உதாரணம்: உறுப்பினர், தொகுதிச் செயலாளர்">
            </div>

            <div class="form-group">
                <label for="district">மாவட்டம்</label>
                <select id="district" name="district" required>
                    <option value="" disabled selected>உங்கள் மாவட்டத்தைத் தேர்ந்தெடுக்கவும்</option>
                    <option value="chennai">சென்னை</option>
                    <option value="coimbatore">கோயம்புத்தூர்</option>
                    <option value="madurai">மதுரை</option>
                    <option value="trichy">திருச்சிராப்பள்ளி</option>
                    <!-- மற்ற மாவட்டங்களை இங்கே சேர்க்கலாம் -->
                </select>
            </div>

            <div class="form-group">
                <label for="pincode">அஞ்சல் குறியீடு</label>
                <input type="number" id="pincode" name="pincode" placeholder="600001" required pattern="[0-9]{6}">
            </div>

            <button type="submit" class="submit-button">சமர்ப்பிக்க</button>
        </form>
    </div>
</main>

<footer>
    <p>&copy; 2024 சமத்துவ மக்கள் கட்சி. அனைத்து உரிமைகளும் பாதுகாக்கப்பட்டவை.</p>
</footer>

</body>
</html>
